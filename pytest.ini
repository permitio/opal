# Handling DeprecationWarning 'asyncio_mode' default value
[pytest]
asyncio_mode = strict
# Scope the default (rootdir) collection to the unit tests under packages/.
# The heavyweight, docker-compose-driven test bed under app-tests/git-leak/ is
# designed to FAIL on master (it is the regression gate for later PRs) and must
# not be collected by the repo's CI `pytest` run. testpaths only applies when
# pytest is invoked from the rootdir with no args, so running it explicitly
# (e.g. `cd app-tests/git-leak && pytest`) still works.
testpaths = packages
