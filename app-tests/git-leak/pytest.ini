[pytest]
# Self-root the git-leak suite so `cd app-tests/git-leak && pytest --boot-scopes=N`
# is deterministic regardless of pytest version or cwd.
#
# The repo-root pytest.ini sets `testpaths = packages` to keep this docker suite
# out of the CI unit run. Per pytest, `testpaths` only applies when pytest is
# invoked *from the rootdir*, so running from here already collects this dir and
# loads its conftest (where --boot-scopes is registered). This empty [pytest]
# marker makes that guarantee explicit — it pins the rootdir to this directory
# when run in place, independent of the root config — while the root run (from
# the repo root) still never descends here.
