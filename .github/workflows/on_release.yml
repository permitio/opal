name: Build and publish to Docker Hub
on:
  release:
    # job will automatically run after a new "release" is create on github.
    types: [published]

jobs:
  # Build once, run e2e validation, and only then fan out to publish variants
  build_and_test:
    runs-on: ubuntu-latest
    env:
      github_token: ${{ secrets.TOKEN_GITHUB }}
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Echo version tag
        run: |
          echo "The version tag that will be published to docker hub is: ${{ github.event.release.tag_name }}"

      - name: Build client for testing
        id: build_client
        uses: docker/build-push-action@v6
        with:
          file: docker/Dockerfile
          push: false
          target: client
          cache-from: type=gha,scope=client
          cache-to: type=gha,scope=client,mode=max
          load: true
          tags: |
            permitio/opal-client:test

      - name: Build server for testing
        id: build_server
        uses: docker/build-push-action@v6
        with:
          file: docker/Dockerfile
          push: false
          target: server
          cache-from: type=gha,scope=server
          cache-to: type=gha,scope=server,mode=max
          load: true
          tags: |
            permitio/opal-server:test

      - name: Create modified docker compose file
        run: sed 's/:latest/:test/g' docker/docker-compose-example.yml > docker/docker-compose-test.yml

      - name: Bring up stack
        run: docker compose -f docker/docker-compose-test.yml up -d

      - name: Check if OPA is healthy
        run: ./scripts/wait-for.sh -t 60 http://localhost:8181/v1/data/users -- sleep 10 && curl -s "http://localhost:8181/v1/data/users" | jq '.result.bob.location.country == "US"'

      - name: Output container logs
        run: docker compose -f docker/docker-compose-test.yml logs

  # Build each architecture natively, then merge into multi-arch manifests
  publish_docker_images:
    needs: build_and_test
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        target:
          - name: client
            repository: permitio/opal-client
            dockerfile_target: client
            version_suffix: ""
          - name: client-alpine
            repository: permitio/opal-client
            dockerfile_target: client-alpine
            version_suffix: "-alpine"
          - name: client-standalone
            repository: permitio/opal-client-standalone
            dockerfile_target: client-standalone
            version_suffix: ""
          - name: client-standalone-alpine
            repository: permitio/opal-client-standalone
            dockerfile_target: client-standalone-alpine
            version_suffix: "-alpine"
          - name: client-cedar
            repository: permitio/opal-client-cedar
            dockerfile_target: client-cedar
            version_suffix: ""
          - name: client-cedar-alpine
            repository: permitio/opal-client-cedar
            dockerfile_target: client-cedar-alpine
            version_suffix: "-alpine"
          - name: client-eopa
            repository: permitio/opal-client-eopa
            dockerfile_target: client-eopa
            version_suffix: ""
          - name: client-eopa-alpine
            repository: permitio/opal-client-eopa
            dockerfile_target: client-eopa-alpine
            version_suffix: "-alpine"
          - name: server
            repository: permitio/opal-server
            dockerfile_target: server
            version_suffix: ""
          - name: server-alpine
            repository: permitio/opal-server
            dockerfile_target: server-alpine
            version_suffix: "-alpine"
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.8'

      - name: Bump version - packaging__.py
        run: |
          pip install semver packaging
          version_tag=${{ github.event.release.tag_name }}
          version_tag=${version_tag#v}
          pypi_version=$(python semver2pypi.py $version_tag)
          sed -i "s/__version__ = VERSION_STRING/__version__ = \"$pypi_version\"/" packages/__packaging__.py

      - name: Build and push ${{ matrix.target.name }}-${{ matrix.arch }}
        uses: docker/build-push-action@v6
        with:
          file: docker/Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: true
          target: ${{ matrix.target.dockerfile_target }}
          cache-from: type=gha,scope=${{ matrix.target.dockerfile_target }}-${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.target.dockerfile_target }}-${{ matrix.arch }},mode=max
          tags: ${{ matrix.target.repository }}:${{ github.event.release.tag_name }}${{ matrix.target.version_suffix }}-${{ matrix.arch }}

  # Merge architecture-specific images into multi-arch manifests
  create_manifests:
    needs: publish_docker_images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - repository: permitio/opal-client
            version_suffix: ""
          - repository: permitio/opal-client
            version_suffix: "-alpine"
          - repository: permitio/opal-client-standalone
            version_suffix: ""
          - repository: permitio/opal-client-standalone
            version_suffix: "-alpine"
          - repository: permitio/opal-client-cedar
            version_suffix: ""
          - repository: permitio/opal-client-cedar
            version_suffix: "-alpine"
          - repository: permitio/opal-client-eopa
            version_suffix: ""
          - repository: permitio/opal-client-eopa
            version_suffix: "-alpine"
          - repository: permitio/opal-server
            version_suffix: ""
          - repository: permitio/opal-server
            version_suffix: "-alpine"
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push manifest for ${{ matrix.repository }}${{ matrix.version_suffix }}
        run: |
          VERSION_TAG="${{ github.event.release.tag_name }}"
          REPO="${{ matrix.repository }}"
          SUFFIX="${{ matrix.version_suffix }}"

          # Create versioned manifest
          docker manifest create ${REPO}:${VERSION_TAG}${SUFFIX} \
            ${REPO}:${VERSION_TAG}${SUFFIX}-amd64 \
            ${REPO}:${VERSION_TAG}${SUFFIX}-arm64
          docker manifest push ${REPO}:${VERSION_TAG}${SUFFIX}

          # Create latest manifest (only for non-prerelease)
          if [ "${{ github.event.release.prerelease }}" != "true" ]; then
            docker manifest create ${REPO}:latest${SUFFIX} \
              ${REPO}:${VERSION_TAG}${SUFFIX}-amd64 \
              ${REPO}:${VERSION_TAG}${SUFFIX}-arm64
            docker manifest push ${REPO}:latest${SUFFIX}
          fi

  publish_python_packages:
    needs:
      - build_and_test
    if: ${{ github.event.release.prerelease == false }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.8'

      - name: Bump version - packaging__.py
        run: |
          # Install required packages
          pip install semver packaging

          # Get version tag and remove 'v' prefix
          version_tag=${{ github.event.release.tag_name }}
          version_tag=${version_tag#v}

          # Convert semver to PyPI version using the script
          pypi_version=$(python semver2pypi.py $version_tag)

          # Update only the __version__ in __packaging__.py
          sed -i "s/__version__ = VERSION_STRING/__version__ = \"$pypi_version\"/" packages/__packaging__.py

          # Print the result for verification
          echo "Original version tag: $version_tag"
          echo "PyPI version: $pypi_version"
          cat packages/__packaging__.py

      - name: Cleanup setup.py and Build every sub-packages
        run: |
          pip install wheel
          cd packages/opal-common/ ; rm -rf *.egg-info build/ dist/
          python setup.py sdist bdist_wheel
          cd ../..
          cd packages/opal-client/ ; rm -rf *.egg-info build/ dist/
          python setup.py sdist bdist_wheel
          cd ../..
          cd packages/opal-server/ ; rm -rf *.egg-info build/ dist/
          python setup.py sdist bdist_wheel
          cd ../..

      # Upload package distributions to the release - All assets in one step
      - name: Upload assets to release
        uses: shogo82148/actions-upload-release-asset@v1.7.5
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: |
            packages/opal-common/dist/*
            packages/opal-client/dist/*
            packages/opal-server/dist/*

      # Publish package distributions to PyPI
      - name: Publish package distributions to PyPI - Opal-Common
        if: ${{ github.event.release.prerelease == false }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          packages-dir: packages/opal-common/dist/
          # For Test only!
          # password: ${{ secrets.TEST_PYPI_TOKEN }}
          # repository-url: https://test.pypi.org/legacy/
        env:
          name: pypi
          url: https://pypi.org/p/opal-common/

      - name: Publish package distributions to PyPI - Opal-Client
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          packages-dir: packages/opal-client/dist/
          # For Test only!
          # password: ${{ secrets.TEST_PYPI_TOKEN }}
          # repository-url: https://test.pypi.org/legacy/
        env:
          name: pypi
          url: https://pypi.org/p/opal-client/

      - name: Publish package distributions to PyPI - Opal-Server
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          packages-dir: packages/opal-server/dist/
          # For Test only!
          # password: ${{ secrets.TEST_PYPI_TOKEN }}
          # repository-url: https://test.pypi.org/legacy/
        env:
          name: pypi
          url: https://pypi.org/p/opal-server/
