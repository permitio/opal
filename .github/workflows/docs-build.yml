name: Docs build

on:
  pull_request:
    paths:
      - 'documentation/**'
      - '.github/workflows/docs-build.yml'
    branches: [ master ]
  push:
    paths:
      - 'documentation/**'
      - '.github/workflows/docs-build.yml'
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read

env:
  # Corepack's signature check can fail to download newer pnpm on CI images;
  # documented workaround. The pnpm version is still integrity-pinned by the
  # sha512 hash in documentation/package.json "packageManager".
  COREPACK_INTEGRITY_KEYS: "0"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: documentation

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: documentation/.nvmrc

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build documentation
        run: pnpm build
